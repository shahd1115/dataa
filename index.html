<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Analysis & Design Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Mode Selection */
        .mode-selection {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 20px 40px;
            border: none;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            color: white;
            min-width: 250px;
        }

        .mode-tf {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .mode-mcq {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .mode-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* Score Board */
        .score-board {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .score-item {
            text-align: center;
        }

        .score-item .number {
            font-size: 2rem;
            font-weight: 800;
        }

        .score-item .label {
            color: #666;
            font-size: 0.9rem;
        }

        .correct { color: #22c55e; }
        .wrong { color: #ef4444; }
        .total { color: #667eea; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-tf { background: linear-gradient(90deg, #667eea, #764ba2); }
        .progress-mcq { background: linear-gradient(90deg, #11998e, #38ef7d); }

        /* Question Card */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            color: white;
        }

        .question-number-tf { background: linear-gradient(135deg, #667eea, #764ba2); }
        .question-number-mcq { background: linear-gradient(135deg, #11998e, #38ef7d); }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* True/False Buttons */
        .tf-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        .btn-true {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .btn-false {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* MCQ Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            text-align: right;
            background: white;
            color: #1f2937;
        }

        .option-btn:hover {
            transform: translateX(-5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-letter {
            display: inline-block;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            font-weight: 700;
            margin-left: 12px;
            font-size: 0.9rem;
            color: white;
        }

        .letter-tf { background: linear-gradient(135deg, #667eea, #764ba2); }
        .letter-mcq { background: linear-gradient(135deg, #11998e, #38ef7d); }

        /* Answer States */
        .correct-answer {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        .wrong-answer {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .selected-wrong {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }

        /* Feedback */
        .feedback {
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback.correct-answer {
            background: #dcfce7;
            border: 2px solid #22c55e;
            color: #166534;
        }

        .feedback.wrong-answer {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #991b1b;
        }

        .feedback-title {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .feedback-text {
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Navigation Buttons */
        .next-btn {
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            font-family: 'Cairo', sans-serif;
            display: none;
            transition: all 0.3s ease;
        }

        .next-btn-tf { background: linear-gradient(135deg, #667eea, #764ba2); }
        .next-btn-mcq { background: linear-gradient(135deg, #11998e, #38ef7d); }

        .next-btn:hover {
            transform: scale(1.05);
        }

        .back-btn {
            background: #6b7280;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #4b5563;
            transform: scale(1.05);
        }

        /* Results Screen */
        .results-screen {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .results-screen h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #1f2937;
        }

        .final-score {
            font-size: 4rem;
            font-weight: 800;
            margin: 20px 0;
        }

        .score-tf {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .score-mcq {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-message {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        .restart-btn {
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .restart-tf { background: linear-gradient(135deg, #667eea, #764ba2); }
        .restart-mcq { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .restart-home { background: linear-gradient(135deg, #6b7280, #4b5563); }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Hidden sections */
        .hidden { display: none !important; }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.6rem;
            }
            .question-text {
                font-size: 1.1rem;
            }
            .btn, .option-btn {
                font-size: 1rem;
                padding: 12px 15px;
            }
            .mode-btn {
                min-width: 200px;
                padding: 15px 25px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Home Screen -->
        <div id="home-screen">
            <div class="header">
                <h1>📚 Analysis and Design Question Bank</h1>
                <p>System Analysis & Design - اختار نوع الأسئلة اللي عايزة تحليها</p>
            </div>

            <div class="mode-selection">
                <button class="mode-btn mode-tf" onclick="startQuiz('tf')">
                    ✅❌<br>TRUE/FALSE<br><small> Q 60 </small>
                </button>
                <button class="mode-btn mode-mcq" onclick="startQuiz('mcq')">
                    📝<br>اMCQ<br><small>Q 50 </small>
                </button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <button class="back-btn" onclick="goHome()">← رجوع للقائمة الرئيسية</button>

            <div class="header">
                <h1 id="quiz-title"></h1>
            </div>

            <div class="score-board">
                <div class="score-item">
                    <div class="number correct" id="correct-count">0</div>
                    <div class="label">صح ✅</div>
                </div>
                <div class="score-item">
                    <div class="number wrong" id="wrong-count">0</div>
                    <div class="label">خطأ ❌</div>
                </div>
                <div class="score-item">
                    <div class="number total" id="current-question">1/60</div>
                    <div class="label">السؤال الحالي</div>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>

            <div id="quiz-container"></div>
        </div>

        <!-- Results Screen -->
        <div class="results-screen hidden" id="results-screen">
            <div class="emoji" id="result-emoji">🎉</div>
            <h2>انتهى الاختبار!</h2>
            <div class="final-score" id="final-score">0/60</div>
            <div class="result-message" id="result-message"></div>
            <button class="restart-btn" id="restart-same-btn" onclick="restartQuiz()">🔄 إعادة نفس الاختبار</button>
            <button class="restart-btn restart-home" onclick="goHome()">🏠 القائمة الرئيسية</button>
        </div>
    </div>

    <script>
        // ==================== TRUE/FALSE QUESTIONS (60) ====================
        const tfQuestions = [
            { q: "Hardware includes physical equipment used for input, output, and processing.", a: true, exp: "الإجابة: True - الأجهزة تشمل المعدات المادية المستخدمة للإدخال والإخراج والمعالجة." },
            { q: "Software is the application program used to control and coordinate hardware.", a: true, exp: "الإجابة: True - البرمجيات هي البرامج التطبيقية المستخدمة للتحكم في الأجهزة وتنسيقها." },
            { q: "Data are organized facts used to generate information immediately.", a: false, exp: "الإجابة: False - البيانات هي حقائق خام غير منظمة يتم معالجتها لاحقًا لتصبح معلومات." },
            { q: "Database software is used for efficient access to required data.", a: true, exp: "الإجابة: True - برامج قواعد البيانات تُستخدم للوصول الفعال إلى البيانات المطلوبة." },
            { q: "A Network consists of only one computer connected to a printer.", a: false, exp: "الإجابة: False - الشبكة هي مجموعة من الأجهزة المتصلة معًا لمشاركة الموارد." },
            { q: "People are the most important component of an information system.", a: true, exp: "الإجابة: True - الأشخاص هم المكون الأهم في نظام المعلومات." },
            { q: "System design is the process of creating a high-level architecture for a software solution.", a: true, exp: "الإجابة: True - تصميم النظام هو عملية إنشاء بنية عالية المستوى لحل برمجي." },
            { q: "The System Development Life Cycle (SDLC) has only 3 stages.", a: false, exp: "الإجابة: False - SDLC يتكون عادةً من مراحل متعددة تشمل التخطيط والتحليل والتصميم والتنفيذ والصيانة." },
            { q: "User Interface (UI) design focuses on how a user interacts with a system.", a: true, exp: "الإجابة: True - تصميم واجهة المستخدم يركز على كيفية تفاعل المستخدم مع النظام." },
            { q: "A 'Centralized System' means data processing occurs in one single center.", a: true, exp: "الإجابة: True - النظام المركزي يعني أن معالجة البيانات تحدث في مركز واحد." },
            { q: "System Software includes Device Drivers and Firmware.", a: true, exp: "الإجابة: True - برامج النظام تشمل برامج تشغيل الأجهزة والبرامج الثابتة (Firmware)." },
            { q: "Analysis is the stage where the actual code is written.", a: false, exp: "الإجابة: False - البرمجة تحدث في مرحلة التنفيذ/التطوير، وليس في مرحلة التحليل." },
            { q: "Feasibility studies help determine if a project should move forward.", a: true, exp: "الإجابة: True - دراسات الجدوى تساعد في تحديد ما إذا كان المشروع يجب أن يمضي قدمًا." },
            { q: "Direct cutover is a method of moving components from an old system to a new one.", a: true, exp: "الإجابة: True - التحويل المباشر هو طريقة لنقل المكونات من نظام قديم إلى نظام جديد." },
            { q: "Dialogue design is a sequence of information displayed to and obtained from a user.", a: true, exp: "الإجابة: True - تصميم الحوار هو تسلسل من المعلومات المعروضة للمستخدم والمستلمة منه." },
            { q: "Operating systems are a type of Application Software.", a: false, exp: "الإجابة: False - أنظمة التشغيل هي نوع من برامج النظام (System Software)، وليس التطبيقات." },
            { q: "Maintenance is the last stage of the SDLC.", a: true, exp: "الإجابة: True - الصيانة هي المرحلة الأخيرة من دورة حياة تطوير النظام." },
            { q: "'Scalability' is a decision made during the system design phase.", a: true, exp: "الإجابة: True - 'قابلية التوسع' هي قرار يُتخذ خلال مرحلة تصميم النظام." },
            { q: "Information systems cannot work without data.", a: true, exp: "الإجابة: True - أنظمة المعلومات لا يمكن أن تعمل بدون بيانات." },
            { q: "Secondary storage is used to store data temporarily during processing.", a: false, exp: "الإجابة: False - التخزين الثانوي للتخزين الدائم، أما التخزين المؤقت فهو الذاكرة العشوائية (RAM)." },
            { q: "User requirements are identified during the Design phase.", a: false, exp: "الإجابة: False - يتم تحديد متطلبات المستخدمين خلال مرحلة التحليل، وليس التصميم." },
            { q: "Decentralized systems have a processing center for each major department.", a: true, exp: "الإجابة: True - الأنظمة اللامركزية لها مركز معالجة لكل قسم رئيسي." },
            { q: "Utility software is a type of system software.", a: true, exp: "الإجابة: True - برامج الأدوات المساعدة هي نوع من برامج النظام." },
            { q: "Testing ensures the program is successful before client production.", a: true, exp: "الإجابة: True - الاختبار يضمن نجاح البرنامج قبل الإنتاج للعميل." },
            { q: "Dialogue diagrams use boxes with three sections.", a: true, exp: "الإجابة: True - مخططات الحوار تستخدم مربعات بثلاثة أقسام." },
            { q: "System design involves making decisions about security and performance.", a: true, exp: "الإجابة: True - تصميم النظام يتضمن اتخاذ قرارات بشأن الأمان والأداء." },
            { q: "A 'Network' allows for the sharing of resources like printers.", a: true, exp: "الإجابة: True - الشبكة تسمح بمشاركة الموارد مثل الطابعات." },
            { q: "Database Management Systems (DBMS) manage data storage.", a: true, exp: "الإجابة: True - أنظمة إدارة قواعد البيانات تدير تخزين البيانات." },
            { q: "People are not considered a component of Information Systems.", a: false, exp: "الإجابة: False - الأشخاص يُعتبرون مكونًا أساسيًا من مكونات نظام المعلومات." },
            { q: "Processors are considered a hardware component.", a: true, exp: "الإجابة: True - المعالجات تُعتبر مكونًا من مكونات الأجهزة." },
            { q: "System design meets the constraints of a problem.", a: true, exp: "الإجابة: True - تصميم النظام يلبي قيود المشكلة." },
            { q: "Analysis phase results include a clear definition of the problem.", a: true, exp: "الإجابة: True - نتائج مرحلة التحليل تشمل تعريفًا واضحًا للمشكلة." },
            { q: "The budget for a new system is determined after it is built.", a: false, exp: "الإجابة: False - الميزانية تحدد كجزء من دراسة الجدوى ونتائج التحليل، وليس بعد البناء." },
            { q: "Monitoring for bugs occurs during the Operations and Maintenance phase.", a: true, exp: "الإجابة: True - مراقبة الأخطاء تحدث خلال مرحلة التشغيل والصيانة." },
            { q: "Dialogue diagrams represent the sequencing of displays.", a: true, exp: "الإجابة: True - مخططات الحوار تمثل تسلسل العروض." },
            { q: "Input devices are part of the hardware structure.", a: true, exp: "الإجابة: True - أجهزة الإدخال هي جزء من بنية الأجهزة." },
            { q: "Application software coordinates hardware components.", a: false, exp: "الإجابة: False - برامج النظام (System Software) هي التي تنسق الأجهزة، أما برامج التطبيقات فتؤدي مهام محددة للمستخدمين." },
            { q: "Data flows are a key consideration in system design.", a: true, exp: "الإجابة: True - تدفقات البيانات هي اعتبار رئيسي في تصميم النظام." },
            { q: "Decentralization can improve data processing speed for specific departments.", a: true, exp: "الإجابة: True - اللامركزية يمكن أن تحسن سرعة معالجة البيانات للأقسام المحددة." },
            { q: "Implementation includes the process of 'Direct Cutover'.", a: true, exp: "الإجابة: True - التنفيذ يتضمن عملية 'التحويل المباشر' (Direct Cutover)." },
            { q: "User Interface design includes the 'Principles for good design'.", a: true, exp: "الإجابة: True - تصميم واجهة المستخدم يتضمن 'مبادئ التصميم الجيد'." },
            { q: "System Analysis results include a description of the current system.", a: true, exp: "الإجابة: True - نتائج تحليل النظام تشمل وصفًا للنظام الحالي." },
            { q: "Computer peripherals are NOT considered hardware.", a: false, exp: "الإجابة: False - الأجهزة الطرفية للكمبيوتر تُعتبر أجهزة (Hardware)." },
            { q: "Operations and Maintenance identify parts of a system that need improving.", a: true, exp: "الإجابة: True - التشغيل والصيانة تحدد أجزاء النظام التي تحتاج إلى تحسين." },
            { q: "A bidirectional line in a dialogue diagram connects sections.", a: true, exp: "الإجابة: True - الخط ثنائي الاتجاه في مخطط الحوار يربط الأقسام." },

                exp: "الإجابة: C - System Software - برامج النظام (مثل أنظمة التشغيل) هي التي تتحكم في الأجهزة."

                ],
                correct: 1,
                exp: "الإجابة: B - Manage databases - DBMS تُستخدم بشكل أساسي لإدارة قواعد البيانات."
            },
            {
                q: "Which is an example of an information system?",
                options: [
                    { letter: "A", text: "Online banking system" },
                    { letter: "B", text: "Mouse" },
                    { letter: "C", text: "Printer cable" },
                    { letter: "D", text: "Scanner only" }
                ],
                correct: 0,
                exp: "الإجابة: A - Online banking system - نظام الخدمات المصرفية عبر الإنترنت هو مثال على نظام معلومات."
            },
            {
                q: "Procedures help organizations to:",
                options: [
                    { letter: "A", text: "Increase processor speed" },
                    { letter: "B", text: "Standardize workflow" },

                ],
                correct: 1,
                exp: "الإجابة: B - Standardize workflow - الإجراءات تساعد المؤسسات على توحيد سير العمل."
            },
            {
                q: "End users of an information system include:",
                options: [
                    { letter: "A", text: "Managers" },
                    { letter: "B", text: "Accountants" },
                    { letter: "C", text: "Engineers" },
                    { letter: "D", text: "All of the above" }
                ],
                correct: 3,
                exp: "الإجابة: D - All of the above - المستخدمون النهائيون يشملون المديرين والمحاسبين والمهندسين وغيرهم."
            },
            {
                q: "An information system performs which cycle?",
                options: [
                    { letter: "A", text: "Delete → Ignore → Stop" },
                    { letter: "B", text: "Input → Process → Output" },
                    { letter: "C", text: "Print → Shut down" },
                    { letter: "D", text: "Store → Forget" }
                ],
                correct: 1,
                exp: "الإجابة: B - Input → Process → Output - نظام المعلومات يقوم بدورة: إدخال → معالجة → إخراج."
            },
            {
                q: "Security devices belong to:",
                options: [
                    { letter: "A", text: "Hardware" },
                    { letter: "B", text: "Software" },
                    { letter: "C", text: "Procedures" },
                    { letter: "D", text: "Data" }
                ],
                correct: 0,
                exp: "الإجابة: A - Hardware - أجهزة الأمان (مثل جدران الحماية وأجهزة القياسات الحيوية) هي مكونات مادية (Hardware)."
            },
            {
                q: "Utility software is mainly used to:",
                options: [
                    { letter: "A", text: "Play games" },
                    { letter: "B", text: "Maintain and protect system" },
                    { letter: "C", text: "Build hardware" },
                    { letter: "D", text: "Replace OS" }
                ],
                correct: 1,
                exp: "الإجابة: B - Maintain and protect system - برامج الأدوات المساعدة تُستخدم بشكل أساسي للصيانة وحماية النظام."
            }
        ];

        // ==================== GAME STATE ====================
        let currentMode = '';
        let currentQuestion = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let answered = false;
        let questions = [];

        // ==================== NAVIGATION ====================
        function startQuiz(mode) {
            currentMode = mode;
            currentQuestion = 0;
            correctCount = 0;
            wrongCount = 0;
            answered = false;

            if (mode === 'tf') {
                questions = tfQuestions;
                document.getElementById('quiz-title').textContent = '✅❌ TRUE/FALSE -  Q 60 ';
                document.getElementById('progress-fill').className = 'progress-fill progress-tf';
                document.getElementById('restart-same-btn').className = 'restart-btn restart-tf';
            } else {
                questions = mcqQuestions;
                document.getElementById('quiz-title').textContent = '📝 MCQ -  Q 50 ';
                document.getElementById('progress-fill').className = 'progress-fill progress-mcq';
                document.getElementById('restart-same-btn').className = 'restart-btn restart-mcq';
            }

            document.getElementById('correct-count').textContent = '0';
            document.getElementById('wrong-count').textContent = '0';

            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('results-screen').classList.add('hidden');

            renderQuestion();
        }

        function goHome() {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.add('hidden');
        }

        // ==================== RENDER QUESTION ====================
        function renderQuestion() {
            answered = false;
            const container = document.getElementById('quiz-container');
            const q = questions[currentQuestion];
            const totalQuestions = questions.length;

            document.getElementById('current-question').textContent = `${currentQuestion + 1}/${totalQuestions}`;
            const progress = ((currentQuestion + 1) / totalQuestions) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            if (currentMode === 'tf') {
                // Render True/False Question
                container.innerHTML = `
                    <div class="question-card" id="question-card">
                        <div class="question-number question-number-tf">السؤال ${currentQuestion + 1} من ${totalQuestions}</div>
                        <div class="question-text">${q.q}</div>
                        <div class="tf-buttons">
                            <button class="btn btn-true" onclick="answerTF(true)">✅ صح (True)</button>
                            <button class="btn btn-false" onclick="answerTF(false)">❌ خطأ (False)</button>
                        </div>
                        <div class="feedback" id="feedback">
                            <div class="feedback-title" id="feedback-title"></div>
                            <div class="feedback-text" id="feedback-text"></div>
                        </div>
                        <button class="next-btn next-btn-tf" id="next-btn" onclick="nextQuestion()">السؤال التالي ←</button>
                    </div>
                `;
            } else {
                // Render MCQ Question
                let optionsHtml = '';
                q.options.forEach((opt, index) => {
                    optionsHtml += `
                        <button class="option-btn" id="option-${index}" onclick="answerMCQ(${index})">
                            <span class="option-letter letter-mcq">${opt.letter}</span>
                            ${opt.text}
                        </button>
                    `;
                });

                container.innerHTML = `
                    <div class="question-card" id="question-card">
                        <div class="question-number question-number-mcq">السؤال ${currentQuestion + 1} من ${totalQuestions}</div>
                        <div class="question-text">${q.q}</div>
                        <div class="options">
                            ${optionsHtml}
                        </div>
                        <div class="feedback" id="feedback">
                            <div class="feedback-title" id="feedback-title"></div>
                            <div class="feedback-text" id="feedback-text"></div>
                        </div>
                        <button class="next-btn next-btn-mcq" id="next-btn" onclick="nextQuestion()">السؤال التالي ←</button>
                    </div>
                `;
            }
        }

        // ==================== ANSWER HANDLERS ====================
        function answerTF(userAnswer) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const isCorrect = userAnswer === q.a;
            const feedback = document.getElementById('feedback');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackText = document.getElementById('feedback-text');
            const nextBtn = document.getElementById('next-btn');
            const card = document.getElementById('question-card');

            card.classList.add('answered');

            const trueBtn = card.querySelector('.btn-true');
            const falseBtn = card.querySelector('.btn-false');

            if (q.a === true) {
                trueBtn.classList.add('selected-correct');
                if (!isCorrect) falseBtn.classList.add('selected-wrong');
            } else {
                falseBtn.classList.add('selected-correct');
                if (!isCorrect) trueBtn.classList.add('selected-wrong');
            }

            showFeedback(isCorrect, q.exp);
            trueBtn.disabled = true;
            falseBtn.disabled = true;
        }

        function answerMCQ(selectedIndex) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const isCorrect = selectedIndex === q.correct;

            // Highlight all options
            q.options.forEach((opt, index) => {
                const btn = document.getElementById(`option-${index}`);
                btn.disabled = true;

                if (index === q.correct) {
                    btn.classList.add('correct-answer');
                } else if (index === selectedIndex && !isCorrect) {
                    btn.classList.add('selected-wrong');
                }
            });

            showFeedback(isCorrect, q.exp);
        }

        function showFeedback(isCorrect, explanation) {
            const feedback = document.getElementById('feedback');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackText = document.getElementById('feedback-text');
            const nextBtn = document.getElementById('next-btn');

            feedback.style.display = 'block';
            if (isCorrect) {
                correctCount++;
                feedback.className = 'feedback correct-answer';
                feedbackTitle.innerHTML = '🎉 إجابة صحيحة!';
                document.getElementById('correct-count').textContent = correctCount;
            } else {
                wrongCount++;
                feedback.className = 'feedback wrong-answer';
                feedbackTitle.innerHTML = '😕 إجابة خاطئة';
                document.getElementById('wrong-count').textContent = wrongCount;
            }

            feedbackText.innerHTML = explanation;
            nextBtn.style.display = 'inline-block';
        }
// ==================== NEXT QUESTION ====================
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= questions.length) {
                showResults();
            } else {
                renderQuestion();
            }
        }

        // ==================== RESULTS ====================
        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            const resultsScreen = document.getElementById('results-screen');
            resultsScreen.classList.remove('hidden');

            const totalQuestions = questions.length;
            document.getElementById('final-score').textContent = `${correctCount}/${totalQuestions}`;

            let message = '';
            let emoji = '';
            const percentage = (correctCount / totalQuestions) * 100;

            if (percentage >= 90) {
                emoji = '🏆';
                message = 'أداء ممتاز! أنت خبير في تحليل وتصميم النظم! 🌟';
            } else if (percentage >= 70) {
                emoji = '🎉';
                message = 'أداء جيد جداً! استمر في التقدم! 👏';
            } else if (percentage >= 50) {
                emoji = '👍';
                message = 'أداء مقبول. راجع الدروس وحاول مرة أخرى! 📚';
            } else {
                emoji = '💪';
                message = 'لا تيأس! راجع المادة وحاول مرة أخرى، أنت قادر! 🌟';
            }

            document.getElementById('result-emoji').textContent = emoji;
            document.getElementById('result-message').textContent = message;

            // Set score color based on mode
            const scoreEl = document.getElementById('final-score');
            scoreEl.className = 'final-score ' + (currentMode === 'tf' ? 'score-tf' : 'score-mcq');
        }

        // ==================== RESTART ====================
        function restartQuiz() {
            startQuiz(currentMode);
        }
    </script>
</body>
